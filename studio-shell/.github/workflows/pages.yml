# Build and deploy dist/ to GitHub Pages via gh-pages branch.
# In repo Settings → Pages, set Source to "Deploy from a branch" → gh-pages / root.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          cp -r dist/* .
          touch .nojekyll
          git add -A
          git commit -m "Deploy $(git rev-parse --short HEAD@{1}) to GitHub Pages"
          git branch -M gh-pages-tmp gh-pages
          git push origin gh-pages --force
